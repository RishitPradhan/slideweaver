<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stranger Things — Survive the Upside Down</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    background:#0a0005;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    min-height:100vh;font-family:'Share Tech Mono',monospace;color:#fff;
    overflow:hidden;
  }

  /* — Ambient Particles — */
  .ambient{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
  .ambient span{
    position:absolute;display:block;border-radius:50%;
    background:radial-gradient(circle,rgba(180,20,20,.4),transparent 70%);
    animation:drift linear infinite;opacity:0;
  }
  @keyframes drift{
    0%{transform:translateY(0) translateX(0);opacity:0}
    10%{opacity:.6}
    90%{opacity:.6}
    100%{transform:translateY(100vh) translateX(60px);opacity:0}
  }

  /* — Title — */
  .game-title{
    font-family:Georgia,'Times New Roman',serif;
    font-size:38px;font-weight:900;font-style:italic;
    color:#ff1a1a;text-shadow:0 0 30px #ff0000,0 0 60px #aa0000,0 0 90px #550000;
    letter-spacing:8px;margin-bottom:4px;z-index:2;text-align:center;
  }
  .game-subtitle{
    font-family:'Share Tech Mono',monospace;font-size:13px;letter-spacing:6px;
    color:#cc3333;margin-bottom:16px;z-index:2;
    animation:flicker 3s ease-in-out infinite;
  }
  @keyframes flicker{
    0%,100%{opacity:1}
    47%{opacity:1}48%{opacity:.3}49%{opacity:1}
    72%{opacity:1}73%{opacity:.2}75%{opacity:1}
  }

  /* — Canvas — */
  #gameCanvas{
    border:2px solid #330010;border-radius:4px;
    box-shadow:0 0 20px rgba(180,0,0,.3);z-index:2;
    display:block;background:#0a0005;
  }

  /* — HUD — */
  .hud{
    display:flex;justify-content:space-between;align-items:center;
    width:500px;padding:8px 16px;background:#0d0008;
    border:1px solid #330010;border-top:none;border-radius:0 0 4px 4px;
    z-index:2;font-size:13px;letter-spacing:2px;
  }
  .hud-score{color:#ff4444}
  .hud-lives{color:#ff2222;font-size:16px;letter-spacing:4px}
  .hud-wave{color:#aa3355}

  /* — Progress Section — */
  .progress-section{
    width:500px;margin-top:16px;z-index:2;text-align:center;
  }
  .progress-label{
    font-size:11px;letter-spacing:3px;color:#883344;margin-bottom:6px;
  }
  .progress-track{
    width:100%;height:18px;background:#110008;border:1px solid #330015;
    border-radius:9px;overflow:hidden;position:relative;
  }
  .progress-fill{
    height:100%;width:0%;border-radius:9px;
    background:linear-gradient(90deg,#660011,#cc1133,#ff2244);
    box-shadow:0 0 12px #ff1133;transition:width .4s ease;
  }
  .progress-fill.complete{
    animation:progressPulse 1s ease-in-out infinite;
  }
  @keyframes progressPulse{
    0%,100%{box-shadow:0 0 12px #ff1133}
    50%{box-shadow:0 0 30px #ff4466,0 0 50px #ff1133}
  }

  /* — Christmas Lights — */
  .lights-row{
    display:flex;justify-content:space-evenly;
    width:500px;margin-top:8px;z-index:2;
  }
  .light-bulb{
    width:10px;height:10px;border-radius:50%;
    background:#220008;border:1px solid #330010;
    transition:background .3s,box-shadow .3s;
  }
  .light-bulb.on{box-shadow:0 0 8px 2px var(--c);background:var(--c)}
  .light-bulb.celebrate{animation:celebrateBlink .2s ease-in-out infinite alternate}
  @keyframes celebrateBlink{
    0%{opacity:1;transform:scale(1)}100%{opacity:.5;transform:scale(1.3)}
  }

  /* — Mobile Controls — */
  .mobile-controls{
    display:flex;gap:12px;margin-top:14px;z-index:2;
  }
  .mobile-btn{
    background:#1a000a;border:1px solid #550020;color:#ff4444;
    padding:10px 22px;font-family:'Share Tech Mono',monospace;
    font-size:14px;cursor:pointer;border-radius:4px;letter-spacing:2px;
    user-select:none;-webkit-user-select:none;
    transition:background .15s;
  }
  .mobile-btn:active{background:#330015;box-shadow:0 0 10px #ff1133}

  /* — Overlay Screens — */
  .overlay{
    position:absolute;top:0;left:0;width:500px;height:360px;
    display:none;flex-direction:column;align-items:center;justify-content:center;
    background:rgba(10,0,5,.92);z-index:10;border-radius:4px;
  }
  .overlay.show{display:flex}
  .overlay h2{
    font-family:Georgia,serif;font-size:26px;font-style:italic;font-weight:900;
    color:#ff1a1a;text-shadow:0 0 20px #ff0000;letter-spacing:3px;
    margin-bottom:8px;text-align:center;
  }
  .overlay h3{
    font-size:14px;color:#cc4455;letter-spacing:4px;margin-bottom:16px;
  }
  .overlay .score-display{
    font-size:18px;color:#ff6666;margin-bottom:16px;letter-spacing:2px;
  }
  .overlay button{
    background:transparent;border:2px solid #ff2244;color:#ff2244;
    font-family:'Share Tech Mono',monospace;font-size:14px;
    padding:12px 32px;cursor:pointer;letter-spacing:3px;border-radius:4px;
    transition:all .25s;
  }
  .overlay button:hover{
    background:#ff2244;color:#0a0005;box-shadow:0 0 20px #ff2244;
  }
  .overlay .download-btn{
    border-color:#00ff88;color:#00ff88;
    animation:glowGreen 1.5s ease-in-out infinite;
  }
  .overlay .download-btn:hover{background:#00ff88;color:#0a0005}
  @keyframes glowGreen{
    0%,100%{box-shadow:0 0 8px #00ff88}50%{box-shadow:0 0 25px #00ff88,0 0 40px #009955}
  }

  /* — Gravity Warning — */
  .gravity-warning{
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    text-align:center;z-index:8;display:none;pointer-events:none;
  }
  .gravity-warning.show{display:block;animation:pulseWarn 1s ease-in-out infinite}
  .gravity-warning p:first-child{
    font-family:Georgia,serif;font-size:22px;font-weight:900;
    color:#ff2222;text-shadow:0 0 20px #ff0000;letter-spacing:2px;
  }
  .gravity-warning p:last-child{
    font-size:11px;color:#cc3344;letter-spacing:3px;margin-top:4px;
  }
  @keyframes pulseWarn{
    0%,100%{opacity:1;transform:translate(-50%,-50%) scale(1)}
    50%{opacity:.6;transform:translate(-50%,-50%) scale(1.05)}
  }

  .canvas-wrap{position:relative;z-index:2}

  @media(max-width:520px){
    .game-title{font-size:24px;letter-spacing:4px}
    #gameCanvas,.hud,.progress-section,.lights-row{width:95vw}
    #gameCanvas{height:280px}
    .overlay{width:95vw;height:280px}
  }
</style>
</head>
<body>

<!-- Ambient particles -->
<div class="ambient" id="ambient"></div>

<h1 class="game-title">STRANGER THINGS</h1>
<p class="game-subtitle">SURVIVE THE UPSIDE DOWN</p>

<div class="canvas-wrap">
  <canvas id="gameCanvas" width="500" height="360"></canvas>
  <!-- Gravity Warning -->
  <div class="gravity-warning" id="gravityWarning">
    <p>⚠ GRAVITY SHIFT ⚠</p>
    <p>THE UPSIDE DOWN PULLS YOU IN</p>
  </div>
  <!-- Game Over Overlay -->
  <div class="overlay" id="gameOverOverlay">
    <h2>TAKEN BY THE VOID</h2>
    <h3>THE UPSIDE DOWN CLAIMS YOU</h3>
    <div class="score-display" id="goScore">SCORE: 0</div>
    <button id="restartBtn">FIGHT BACK</button>
  </div>
  <!-- Victory Overlay -->
  <div class="overlay" id="victoryOverlay">
    <h2>YOU ESCAPED THE UPSIDE DOWN</h2>
    <h3>YOUR FILE IS READY</h3>
    <div class="score-display" id="victoryScore">FINAL SCORE: 0</div>
    <button class="download-btn" id="downloadBtn">⬇ DOWNLOAD YOUR PPT</button>
  </div>
</div>

<div class="hud">
  <span class="hud-score" id="hudScore">SCORE: 0</span>
  <span class="hud-lives" id="hudLives">♥ ♥ ♥</span>
  <span class="hud-wave" id="hudWave">WAVE 1</span>
</div>

<div class="progress-section">
  <div class="progress-label">CONVERTING YOUR PDF — HOLD ON</div>
  <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
</div>

<div class="lights-row" id="lightsRow"></div>

<div class="mobile-controls">
  <button class="mobile-btn" id="mLeft">◀ LEFT</button>
  <button class="mobile-btn" id="mFire">FIRE</button>
  <button class="mobile-btn" id="mRight">RIGHT ▶</button>
</div>

<script>
/* ══════════════════════════════════════════════════════════════
   STRANGER THINGS — SURVIVE THE UPSIDE DOWN
   Self-contained loading game for PDF-to-PPT conversion
   ══════════════════════════════════════════════════════════════ */

// ── Setup ───────────────────────────────────────────────────
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// DOM refs
const hudScore = document.getElementById('hudScore');
const hudLives = document.getElementById('hudLives');
const hudWave = document.getElementById('hudWave');
const progressFill = document.getElementById('progressFill');
const lightsRow = document.getElementById('lightsRow');
const gravityWarning = document.getElementById('gravityWarning');
const gameOverOverlay = document.getElementById('gameOverOverlay');
const victoryOverlay = document.getElementById('victoryOverlay');
const goScore = document.getElementById('goScore');
const victoryScore = document.getElementById('victoryScore');
const downloadBtn = document.getElementById('downloadBtn');
const restartBtn = document.getElementById('restartBtn');

// ── Christmas Lights Setup ──────────────────────────────────
const LIGHT_COUNT = 30;
const lightColors = ['#ff2244','#ff6622','#ffcc00','#22ff44','#2266ff','#cc22ff','#ff22aa'];
for (let i = 0; i < LIGHT_COUNT; i++) {
  const bulb = document.createElement('div');
  bulb.className = 'light-bulb';
  bulb.style.setProperty('--c', lightColors[i % lightColors.length]);
  lightsRow.appendChild(bulb);
}
const lightBulbs = document.querySelectorAll('.light-bulb');

// ── Ambient Particles ───────────────────────────────────────
const ambientEl = document.getElementById('ambient');
for (let i = 0; i < 20; i++) {
  const s = document.createElement('span');
  const size = 4 + Math.random() * 12;
  s.style.width = size + 'px';
  s.style.height = size + 'px';
  s.style.left = Math.random() * 100 + '%';
  s.style.top = Math.random() * 100 + '%';
  s.style.animationDuration = (10 + Math.random() * 20) + 's';
  s.style.animationDelay = Math.random() * 15 + 's';
  ambientEl.appendChild(s);
}

// ── Game State ──────────────────────────────────────────────
let score = 0, lives = 3, wave = 1;
let gameRunning = false, gameOver = false, conversionDone = false;
let flipped = false;
let flipTimer = 0, warnTimer = 0, showWarning = false;
let spawnTimer = 0, spawnInterval = 70; // frames
let frameCount = 0;
const FLIP_INTERVAL = 20 * 60; // 20 seconds at 60fps
const WARN_BEFORE = 3 * 60;   // 3 seconds warning

// ── Player ──────────────────────────────────────────────────
const player = {
  x: W / 2, y: H - 40, w: 28, h: 24, speed: 5,
};
const keys = { left: false, right: false, fire: false };
let fireCD = 0;

// ── Entity Arrays ───────────────────────────────────────────
let bullets = [];
let enemies = [];
let particles = [];
let bgParticles = [];

// Init some background vine/shadow particles
function initBGParticles() {
  bgParticles = [];
  for (let i = 0; i < 15; i++) {
    bgParticles.push({
      x: Math.random() * W, y: Math.random() * H,
      vx: (Math.random() - 0.5) * 0.5, vy: (Math.random() - 0.5) * 0.3,
      r: 2 + Math.random() * 4, a: Math.random() * 0.4,
      type: Math.random() > 0.5 ? 'vine' : 'shadow',
    });
  }
}

// ── Drawing Helpers ─────────────────────────────────────────
function drawShip(x, y, flip) {
  ctx.save();
  ctx.translate(x, y);
  if (flip) ctx.scale(1, -1);
  // Body
  ctx.fillStyle = '#ff2244';
  ctx.beginPath();
  ctx.moveTo(0, -12);
  ctx.lineTo(-14, 12);
  ctx.lineTo(-6, 8);
  ctx.lineTo(0, 14);
  ctx.lineTo(6, 8);
  ctx.lineTo(14, 12);
  ctx.closePath();
  ctx.fill();
  // Glow
  ctx.shadowColor = '#ff0033';
  ctx.shadowBlur = 15;
  ctx.fillStyle = '#ff4466';
  ctx.beginPath();
  ctx.moveTo(0, -8);
  ctx.lineTo(-6, 6);
  ctx.lineTo(6, 6);
  ctx.closePath();
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.restore();
}

function drawDemogorgon(x, y, r) {
  ctx.save();
  ctx.translate(x, y);
  // Petal-mouth flower shape
  const petals = 5;
  ctx.fillStyle = '#881122';
  ctx.shadowColor = '#ff0033';
  ctx.shadowBlur = 10;
  for (let i = 0; i < petals; i++) {
    ctx.save();
    ctx.rotate((i / petals) * Math.PI * 2);
    ctx.beginPath();
    ctx.ellipse(0, -r * 0.6, r * 0.35, r * 0.7, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
  // Center maw
  ctx.fillStyle = '#330008';
  ctx.beginPath();
  ctx.arc(0, 0, r * 0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.restore();
}

function drawVine(p) {
  ctx.save();
  ctx.globalAlpha = p.a;
  ctx.strokeStyle = '#441122';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(p.x - 8, p.y);
  ctx.bezierCurveTo(p.x - 4, p.y - 6, p.x + 4, p.y + 6, p.x + 8, p.y);
  ctx.stroke();
  ctx.restore();
}

function drawShadow(p) {
  ctx.save();
  ctx.globalAlpha = p.a * 0.6;
  ctx.fillStyle = '#220011';
  ctx.beginPath();
  ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

// ── Particle Burst ──────────────────────────────────────────
function burst(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 3;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      r: 1.5 + Math.random() * 2.5,
      life: 30 + Math.random() * 20,
      maxLife: 50,
      color: color,
    });
  }
}

// ── Enemy Spawn ─────────────────────────────────────────────
function spawnEnemy() {
  const type = Math.random();
  const x = 20 + Math.random() * (W - 40);
  const baseSpeed = 1 + wave * 0.3;

  if (type < 0.7) {
    // Demogorgon
    enemies.push({
      x, y: flipped ? H + 20 : -20,
      r: 14 + Math.random() * 6,
      speed: baseSpeed + Math.random() * 1.2,
      type: 'demogorgon',
      hp: 1,
    });
  } else if (type < 0.85) {
    // Fast vine creature
    enemies.push({
      x, y: flipped ? H + 15 : -15,
      r: 8,
      speed: baseSpeed + 1.5 + Math.random(),
      type: 'vine',
      hp: 1,
    });
  } else {
    // Shadow particle
    enemies.push({
      x, y: flipped ? H + 12 : -12,
      r: 10 + Math.random() * 5,
      speed: baseSpeed * 0.7,
      type: 'shadow',
      hp: 2,
    });
  }
}

// ── Game Logic ──────────────────────────────────────────────
function update() {
  if (!gameRunning || conversionDone) return;
  frameCount++;

  // ── Gravity flip timer ──
  flipTimer++;
  const timeToFlip = FLIP_INTERVAL - (flipTimer % FLIP_INTERVAL);

  if (timeToFlip <= WARN_BEFORE && timeToFlip > 0 && !showWarning) {
    showWarning = true;
    gravityWarning.classList.add('show');
  }

  if (flipTimer % FLIP_INTERVAL === 0 && flipTimer > 0) {
    flipped = !flipped;
    showWarning = false;
    gravityWarning.classList.remove('show');
    // Move player
    player.y = flipped ? 40 : H - 40;
  }

  if (timeToFlip > WARN_BEFORE && showWarning) {
    showWarning = false;
    gravityWarning.classList.remove('show');
  }

  // ── Player movement ──
  if (keys.left && player.x > 18) player.x -= player.speed;
  if (keys.right && player.x < W - 18) player.x += player.speed;

  // ── Fire ──
  if (fireCD > 0) fireCD--;
  if (keys.fire && fireCD <= 0) {
    const dir = flipped ? 1 : -1;
    bullets.push({
      x: player.x, y: player.y + dir * 14,
      vy: dir * 7,
    });
    fireCD = 12;
  }

  // ── Bullets ──
  bullets = bullets.filter(b => {
    b.y += b.vy;
    return b.y > -10 && b.y < H + 10;
  });

  // ── Spawn enemies ──
  spawnTimer++;
  if (spawnTimer >= spawnInterval) {
    spawnEnemy();
    spawnTimer = 0;
  }

  // ── Enemy movement & collision ──
  const dir = flipped ? -1 : 1;
  enemies = enemies.filter(e => {
    e.y += e.speed * dir;

    // Hit by bullet?
    for (let bi = bullets.length - 1; bi >= 0; bi--) {
      const b = bullets[bi];
      const dx = b.x - e.x, dy = b.y - e.y;
      if (Math.sqrt(dx * dx + dy * dy) < e.r + 4) {
        bullets.splice(bi, 1);
        e.hp--;
        burst(e.x, e.y, '#ff3355', 6);
        if (e.hp <= 0) {
          score += (e.type === 'shadow' ? 15 : 10);
          burst(e.x, e.y, '#cc1133', 12);
          return false;
        }
      }
    }

    // Reached player side?
    const escaped = flipped ? e.y < -30 : e.y > H + 30;
    if (escaped) {
      lives--;
      if (lives <= 0) {
        triggerGameOver();
      }
      return false;
    }
    return true;
  });

  // ── Wave progression ──
  if (frameCount % (600 - wave * 30) === 0 && spawnInterval > 25) {
    wave++;
    spawnInterval = Math.max(25, 70 - wave * 5);
  }

  // ── Particles ──
  particles = particles.filter(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.life--;
    return p.life > 0;
  });

  // ── BG particles ──
  bgParticles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    if (p.x < 0) p.x = W;
    if (p.x > W) p.x = 0;
    if (p.y < 0) p.y = H;
    if (p.y > H) p.y = 0;
  });

  updateHUD();
}

// ── Render ──────────────────────────────────────────────────
function render() {
  ctx.clearRect(0, 0, W, H);

  // Background
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#0a0005');
  grad.addColorStop(0.5, '#120008');
  grad.addColorStop(1, '#0a0005');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // BG particles
  bgParticles.forEach(p => {
    if (p.type === 'vine') drawVine(p);
    else drawShadow(p);
  });

  // Bullets
  ctx.fillStyle = '#ff4466';
  ctx.shadowColor = '#ff2244';
  ctx.shadowBlur = 6;
  bullets.forEach(b => {
    ctx.fillRect(b.x - 1.5, b.y - 5, 3, 10);
  });
  ctx.shadowBlur = 0;

  // Enemies
  enemies.forEach(e => {
    if (e.type === 'demogorgon') {
      drawDemogorgon(e.x, e.y, e.r);
    } else if (e.type === 'vine') {
      ctx.save();
      ctx.strokeStyle = '#662233';
      ctx.lineWidth = 2;
      ctx.shadowColor = '#aa1133';
      ctx.shadowBlur = 5;
      ctx.beginPath();
      ctx.moveTo(e.x - 8, e.y + 4);
      ctx.bezierCurveTo(e.x - 3, e.y - 8, e.x + 3, e.y + 8, e.x + 8, e.y - 4);
      ctx.stroke();
      ctx.shadowBlur = 0;
      ctx.restore();
    } else {
      ctx.save();
      ctx.globalAlpha = 0.7;
      ctx.fillStyle = '#330015';
      ctx.shadowColor = '#660022';
      ctx.shadowBlur = 12;
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.globalAlpha = 1;
      ctx.restore();
    }
  });

  // Player
  if (gameRunning && !gameOver) {
    drawShip(player.x, player.y, flipped);
  }

  // Particles
  particles.forEach(p => {
    ctx.save();
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * (p.life / p.maxLife), 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });
}

// ── HUD ─────────────────────────────────────────────────────
function updateHUD() {
  hudScore.textContent = 'SCORE: ' + score;
  hudLives.textContent = Array(Math.max(0, lives)).fill('♥').join(' ');
  hudWave.textContent = 'WAVE ' + wave;
}

// ── Game Over ───────────────────────────────────────────────
function triggerGameOver() {
  gameOver = true;
  gameRunning = false;
  goScore.textContent = 'SCORE: ' + score;
  gameOverOverlay.classList.add('show');
}

// ── Restart ─────────────────────────────────────────────────
restartBtn.addEventListener('click', () => {
  if (conversionDone) return; // conversion overrides
  gameOverOverlay.classList.remove('show');
  resetGame();
});

function resetGame() {
  score = 0; lives = 3; wave = 1;
  flipped = false; flipTimer = 0; spawnTimer = 0; spawnInterval = 70;
  frameCount = 0; fireCD = 0;
  showWarning = false;
  gravityWarning.classList.remove('show');
  player.x = W / 2;
  player.y = H - 40;
  bullets = []; enemies = []; particles = [];
  gameOver = false; gameRunning = true;
  updateHUD();
}

// ── Main Loop ───────────────────────────────────────────────
function gameLoop() {
  update();
  render();
  if (!conversionDone) {
    requestAnimationFrame(gameLoop);
  }
}

// ── Keyboard Input ──────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft' || e.key === 'a') keys.left = true;
  if (e.key === 'ArrowRight' || e.key === 'd') keys.right = true;
  if (e.key === ' ' || e.key === 'ArrowUp') { keys.fire = true; e.preventDefault(); }
});
document.addEventListener('keyup', e => {
  if (e.key === 'ArrowLeft' || e.key === 'a') keys.left = false;
  if (e.key === 'ArrowRight' || e.key === 'd') keys.right = false;
  if (e.key === ' ' || e.key === 'ArrowUp') keys.fire = false;
});

// ── Mobile Controls ─────────────────────────────────────────
function addMobile(id, key) {
  const btn = document.getElementById(id);
  btn.addEventListener('touchstart', e => { e.preventDefault(); keys[key] = true; });
  btn.addEventListener('touchend', e => { e.preventDefault(); keys[key] = false; });
  btn.addEventListener('mousedown', () => keys[key] = true);
  btn.addEventListener('mouseup', () => keys[key] = false);
  btn.addEventListener('mouseleave', () => keys[key] = false);
}
addMobile('mLeft', 'left');
addMobile('mRight', 'right');
addMobile('mFire', 'fire');

// ══════════════════════════════════════════════════════════════
// ── PUBLIC INTEGRATION API ───────────────────────────────────
// ══════════════════════════════════════════════════════════════

/**
 * Update the progress bar (0–100) and light up Christmas lights.
 */
window.updateProgress = function(value) {
  const v = Math.max(0, Math.min(100, value));
  progressFill.style.width = v + '%';

  // Light up bulbs proportionally
  const litCount = Math.floor((v / 100) * LIGHT_COUNT);
  lightBulbs.forEach((bulb, i) => {
    if (i < litCount) {
      bulb.classList.add('on');
    } else {
      bulb.classList.remove('on');
      // Random flicker for unlit bulbs near the edge
      if (i === litCount && Math.random() > 0.5) {
        bulb.classList.add('on');
        setTimeout(() => bulb.classList.remove('on'), 200);
      }
    }
  });
};

/**
 * Call when conversion finishes. Stops game, shows victory, wires download.
 */
window.conversionComplete = function(downloadUrl) {
  conversionDone = true;
  gameRunning = false;
  gameOver = false;

  // Hide any overlays
  gameOverOverlay.classList.remove('show');
  gravityWarning.classList.remove('show');

  // Fill progress to 100%
  progressFill.style.width = '100%';
  progressFill.classList.add('complete');

  // All lights ON + celebrate
  lightBulbs.forEach(bulb => {
    bulb.classList.add('on', 'celebrate');
  });

  // Victory screen
  victoryScore.textContent = 'FINAL SCORE: ' + score;
  victoryOverlay.classList.add('show');

  // Wire download
  downloadBtn.onclick = () => {
    window.location.href = downloadUrl;
  };

  // Final render
  render();
};

// ── Init & Start ────────────────────────────────────────────
initBGParticles();
resetGame();
gameLoop();

// Simulate slow flickering of lights randomly
setInterval(() => {
  if (conversionDone) return;
  const idx = Math.floor(Math.random() * LIGHT_COUNT);
  const bulb = lightBulbs[idx];
  if (!bulb.classList.contains('on')) {
    bulb.classList.add('on');
    setTimeout(() => {
      if (!bulb.classList.contains('celebrate')) bulb.classList.remove('on');
    }, 150 + Math.random() * 300);
  }
}, 400);
</script>
